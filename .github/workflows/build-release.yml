name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          cd Release
          pyinstaller win_build.spec

      - name: Create ZIP archive
        run: |
          cd Release/dist
          Compress-Archive -Path "PDF Font Changer.exe" -DestinationPath "../../PDF-Font-Changer-v${{ github.ref_name }}-Windows.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: PDF-Font-Changer-v${{ github.ref_name }}-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          cd Release
          pyinstaller linux_build.spec

      - name: Create ZIP archive
        run: |
          cd Release/dist
          zip -r ../../PDF-Font-Changer-v${{ github.ref_name }}-Linux.zip "PDF Font Changer"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: PDF-Font-Changer-v${{ github.ref_name }}-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          brew install python-tk@3.12
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          cd Release
          pyinstaller mac_build.spec

      - name: Create ZIP archive
        run: |
          cd Release/dist
          zip -r ../../PDF-Font-Changer-v${{ github.ref_name }}-macOS.zip "PDF Font Changer.app"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: PDF-Font-Changer-v${{ github.ref_name }}-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-source-zip:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source code archive
        run: |
          mkdir -p source_files
          cp main.py pdf_processor.py ocr_processor.py font_scanner.py requirements.txt LICENSE README.md source_files/
          cp -r assets source_files/
          cp Release/*.spec Release/*_Readme.txt Release/README.txt source_files/
          zip -r PDF-Font-Changer-v${{ github.ref_name }}-Source.zip source_files

      - name: Upload Source Code Asset
        uses: softprops/action-gh-release@v1
        with:
          files: PDF-Font-Changer-v${{ github.ref_name }}-Source.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

